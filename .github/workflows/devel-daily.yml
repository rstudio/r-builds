name: Daily R-devel and R-next builds

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      publish_cloudsmith:
        description: |
          Publish to Cloudsmith? Specify repository (e.g., "posit/open") or leave empty to skip.
        required: false
        default: 'posit/open'
        type: string
      cloudsmith_dry_run:
        description: |
          Test Cloudsmith upload without actually publishing.
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  # Generate date-based version for devel builds
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Generate date-based version
        id: version
        run: |
          # Use YYYYMMDD format for package version
          date_string=$(date -u +%Y%m%d)
          echo "package_version=$date_string" >> $GITHUB_OUTPUT
          echo "Generated package version: $date_string"

  r-builds:
    needs: generate-version
    uses: ./.github/workflows/build.yml
    with:
      r_versions: 'devel,next'
      publish: production
      package_version: ${{ needs.generate-version.outputs.package_version }}
      publish_cloudsmith: ${{ inputs.publish_cloudsmith || 'posit/open' }}
      cloudsmith_dry_run: ${{ inputs.cloudsmith_dry_run || false }}
    secrets: inherit

  # Trim accumulated R-next/R-devel nightlies so the Cloudsmith repo doesn't
  # grow without bound. Only runs after a fully successful publish (so a failed
  # build never triggers deletions) and never during a dry run.
  prune-cloudsmith:
    needs: r-builds
    if: ${{ success() && (inputs.publish_cloudsmith || 'posit/open') != '' && inputs.cloudsmith_dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install cloudsmith-cli
        run: pip install --upgrade cloudsmith-cli

      - name: Prune old R-next/R-devel versions
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          python prune_cloudsmith.py --repo "${{ inputs.publish_cloudsmith || 'posit/open' }}" --keep 14
