name: Check for new R versions

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      publish:
        description: |
          Publish the builds to S3 staging or production? Defaults to staging.
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  check-r-versions:
    runs-on: ubuntu-latest
    outputs:
      new_r_versions: ${{ steps.check_r_versions.outputs.new_r_versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check for new R versions to build
        id: check_r_versions
        run: |
          publish=${{ inputs.publish || 'production' }}
          if [ $publish == 'staging' ]; then
            s3_bucket=${{ secrets.S3_BUCKET_STAGING }}
          else
            s3_bucket=${{ secrets.S3_BUCKET_PRODUCTION }}
          fi
          new_r_versions=$(python manage_r_versions.py check --s3-bucket="${s3_bucket}")
          if [ -z "$new_r_versions" ]; then
            echo "No new R versions found"
          else
            echo "New R versions: $new_r_versions"
          fi
          echo "new_r_versions=$new_r_versions" >> $GITHUB_OUTPUT

  build-new-r-versions:
    needs: check-r-versions
    if: ${{ needs.check-r-versions.outputs.new_r_versions != '' }}
    uses: ./.github/workflows/build.yml
    with:
      r_versions: ${{ needs.check-r-versions.outputs.new_r_versions }}
      publish: ${{ inputs.publish || 'production' }}
    secrets: inherit

  build-new-r-versions-macos:
    needs: check-r-versions
    if: ${{ needs.check-r-versions.outputs.new_r_versions != '' }}
    uses: ./.github/workflows/build-macos.yml
    with:
      r_versions: ${{ needs.check-r-versions.outputs.new_r_versions }}
      arch: both
      publish: ${{ inputs.publish || 'production' }}
    secrets:
      AWS_PUBLISH_ROLE: ${{ secrets.AWS_PUBLISH_ROLE }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_STAGING: ${{ secrets.S3_BUCKET_STAGING }}
      S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}
      MACOS_DEVELOPER_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_CERTIFICATE }}
      MACOS_DEVELOPER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_CERTIFICATE_PASSWORD }}
      MACOS_NOTARIZATION_USER_NAME: ${{ secrets.MACOS_NOTARIZATION_USER_NAME }}
      MACOS_NOTARIZATION_USER_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_USER_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-new-r-versions-windows:
    needs: check-r-versions
    if: ${{ needs.check-r-versions.outputs.new_r_versions != '' }}
    uses: ./.github/workflows/build-windows.yml
    with:
      r_versions: ${{ needs.check-r-versions.outputs.new_r_versions }}
      publish: ${{ inputs.publish || 'production' }}
    secrets:
      AWS_PUBLISH_ROLE: ${{ secrets.AWS_PUBLISH_ROLE }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_STAGING: ${{ secrets.S3_BUCKET_STAGING }}
      S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}

  # Notify Hosted about new R versions
  notify-slack-success:
    needs: [build-new-r-versions, build-new-r-versions-macos, build-new-r-versions-windows, check-r-versions]
    if: ${{ needs.check-r-versions.outputs.new_r_versions != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on successful new R version build
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "R-builds - new R versions built and published: ${{ needs.check-r-versions.outputs.new_r_versions }}"
