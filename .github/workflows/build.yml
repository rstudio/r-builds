name: R builds

on:
  push:

  workflow_dispatch:
    inputs:
      platforms:
        description: |
          Comma-separated list of platforms. Specify "all" to use all platforms (the default).
        required: false
        default: 'all'
        type: string
      r_versions:
        description: |
          Comma-separated list of R versions. Specify "last-N" to use the
          last N minor R versions, or "all" to use all minor R versions since R 3.1.
          Use "all-patch" to use all patch versions since R 3.1.
          Defaults to "last-5,3.6.3,devel".
        required: false
        default: 'last-5,3.6.3,devel'
        type: string
      arch:
        description: |
          Comma-separated list of architectures. Specify "amd64", "arm64", or both.
          Defaults to "amd64,arm64".
        required: false
        default: 'amd64,arm64'
        type: choice
        options:
          - 'amd64,arm64'
          - 'amd64'
          - 'arm64'
      publish:
        description: |
          Publish the builds to S3 staging or production? Defaults to not publishing.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - staging
          - production
      package_version:
        description: |
          Package version override for Cloudsmith publishing (e.g., "2", or "20241014" for date-based).
          If empty, reads per-platform/R-version versions from package-versions.json (defaulting to 1).
        required: false
        default: ''
        type: string
      publish_cloudsmith:
        description: |
          Publish to Cloudsmith? Specify repository like "posit/open" or leave empty to skip.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - posit/open
      cloudsmith_dry_run:
        description: |
          Test Cloudsmith upload without actually publishing.
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      platforms:
        description: |
          Comma-separated list of platforms. Specify "all" to use all platforms (the default).
        required: false
        default: 'all'
        type: string
      r_versions:
        description: |
          Comma-separated list of R versions. Specify "last-N" to use the
          last N minor R versions, or "all" to use all minor R versions since R 3.1.
          Defaults to "last-5,3.6.3,devel".
        required: false
        default: 'last-5,3.6.3,devel'
        type: string
      arch:
        description: |
          Comma-separated list of architectures. Specify "amd64", "arm64", or both.
          Defaults to "amd64,arm64".
        required: false
        default: 'amd64,arm64'
        type: string
      publish:
        description: |
          Publish the builds to S3 staging or production? Allowed values are "staging", "production", or empty (default).
        required: false
        default: ''
        type: string
      package_version:
        description: |
          Package version override for Cloudsmith publishing (e.g., "2", or "20241014" for date-based).
          If empty, reads per-platform/R-version versions from package-versions.json (defaulting to 1).
        required: false
        default: ''
        type: string
      publish_cloudsmith:
        description: |
          Publish to Cloudsmith? Specify repository like "posit/open" or leave empty to skip.
        required: false
        default: ''
        type: string
      cloudsmith_dry_run:
        description: |
          Test Cloudsmith upload without actually publishing.
        required: false
        default: false
        type: boolean
    secrets:
      AWS_PUBLISH_ROLE:
        required: false
      AWS_REGION:
        required: false
      S3_BUCKET_STAGING:
        required: false
      S3_BUCKET_PRODUCTION:
        required: false
      CLOUDSMITH_API_KEY:
        required: false
      MACOS_DEVELOPER_CERTIFICATE:
        required: false
      MACOS_DEVELOPER_CERTIFICATE_PASSWORD:
        required: false
      MACOS_NOTARIZATION_USER_NAME:
        required: false
      MACOS_NOTARIZATION_USER_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}
      platforms: ${{ steps.setup-matrix.outputs.platforms }}
      r_versions: ${{ steps.setup-matrix.outputs.r_versions }}
      arch: ${{ steps.setup-matrix.outputs.arch }}
    steps:
    - uses: actions/checkout@v6

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Set up matrix of platforms and R versions
      id: setup-matrix
      run: |
        # Validate the R versions
        r_versions=$(python manage_r_versions.py get "${{ inputs.r_versions }}")

        # Filter out unsupported build combinations
        build_matrix=$(python get_matrix.py --platforms="${{ inputs.platforms }}" --versions="$r_versions" --arch="${{ inputs.arch }}")

        matrix=$(echo "$build_matrix" | jq -c '.matrix')
        platforms=$(echo "$build_matrix" | jq -c '.platforms')
        r_versions=$(echo "$build_matrix" | jq -c '.r_versions')
        arch=$(echo "$build_matrix" | jq -c '.arch')

        echo "matrix=$matrix" >> $GITHUB_OUTPUT
        echo "Using matrix: $matrix"

        echo "platforms=$platforms" >> $GITHUB_OUTPUT
        echo "Using platforms: $platforms"

        echo "r_versions=$r_versions" >> $GITHUB_OUTPUT
        echo "Using R versions: $r_versions"

        echo "arch=$arch" >> $GITHUB_OUTPUT
        echo "Using architectures: $arch"

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: make unit-test

  docker-images:
    # Skip when no Linux platforms remain (e.g. workflow_dispatch with
    # platforms=macos,windows). GHA expands an empty matrix to 0 jobs, but
    # without this guard the workflow run conclusion is reported as failure
    # even though every actual job succeeded — a known quirk of empty
    # matrices in workflow_dispatch runs. The same guard exists on the
    # build job below, and on the build/update jobs in build-macos.yml and
    # build-windows.yml.
    if: ${{ toJson(fromJson(needs.setup-matrix.outputs.platforms)) != '[]' && toJson(fromJson(needs.setup-matrix.outputs.arch)) != '[]' }}
    needs: setup-matrix
    strategy:
      matrix:
        platform: ${{ fromJson(needs.setup-matrix.outputs.platforms) }}
        arch: ${{ fromJson(needs.setup-matrix.outputs.arch) }}
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    name: Docker image (${{ matrix.platform }}-${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Enable Docker layer caching without having to push to a registry.
      # https://docs.docker.com/build/ci/github-actions/examples/#local-cache
      # This may eventually be migrated to the GitHub Actions cache backend,
      # which is still considered experimental.
      # https://github.com/moby/buildkit#github-actions-cache-experimental
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ matrix.platform }}-${{ matrix.arch }}-buildx-${{ github.sha }}
          restore-keys: ${{ matrix.platform }}-${{ matrix.arch }}-buildx-

      # Use docker buildx instead of docker-compose here because cache exporting
      # does not seem to work as of docker-compose v2.6.0 and buildx v0.8.2, even
      # though it works with buildx individually.
      - name: Build image
        run: |
          docker buildx build -t r-builds:${{ matrix.platform }} \
            --file builder/Dockerfile.${{ matrix.platform }} \
            --cache-from "type=local,src=/tmp/.buildx-cache" \
            --cache-to "type=local,dest=/tmp/.buildx-cache-new,mode=max" \
            builder

      # Temporary workaround for unbounded GHA cache growth with the local cache mode.
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  build:
    # See docker-images above for why this guard is needed.
    if: ${{ fromJson(needs.setup-matrix.outputs.matrix).include != null && toJson(fromJson(needs.setup-matrix.outputs.matrix).include) != '[]' }}
    needs: [setup-matrix, docker-images]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    name: ${{ matrix.platform }}-${{ matrix.arch }} (R ${{ matrix.r_version }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore cached Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ matrix.platform }}-${{ matrix.arch }}-buildx-${{ github.sha }}
          restore-keys: ${{ matrix.platform }}-${{ matrix.arch }}-buildx-

      - name: Load cached Docker image
        run: |
          docker buildx build -t r-builds:${{ matrix.platform }} \
            --file builder/Dockerfile.${{ matrix.platform }} \
            --cache-from "type=local,src=/tmp/.buildx-cache" \
            --load \
            builder

      - name: Resolve package version
        id: pkg-version
        env:
          PACKAGE_VERSION_INPUT: ${{ inputs.package_version }}
          PLATFORM: ${{ matrix.platform }}
          R_VERSION: ${{ matrix.r_version }}
        run: |
          if [[ -n "$PACKAGE_VERSION_INPUT" ]]; then
            version="$PACKAGE_VERSION_INPUT"
          else
            version=$(jq -r --arg platform "$PLATFORM" --arg r_version "$R_VERSION" '.[$platform][$r_version] // 1' package-versions.json)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Using package version: $version"

      - name: Build R
        env:
          R_VERSION: ${{ matrix.r_version }}
          PACKAGE_VERSION: ${{ steps.pkg-version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          make build-r-"$PLATFORM"

      - name: Test R
        env:
          R_VERSION: ${{ matrix.r_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          make test-r-"$PLATFORM"
      
      - name: Upload packages for Cloudsmith
        if: ${{ inputs.publish_cloudsmith != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: r-${{ matrix.r_version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            builder/integration/tmp/${{ matrix.platform }}/*.deb
            builder/integration/tmp/${{ matrix.platform }}/*.rpm
          retention-days: 7
          if-no-files-found: warn

      - name: Configure AWS Credentials
        if: ${{ inputs.publish != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish R to S3
        if: ${{ inputs.publish != '' }}
        run: |
          echo "Publishing R for ${{ inputs.publish }}"
          s3_bucket=${{ inputs.publish == 'staging' && secrets.S3_BUCKET_STAGING || secrets.S3_BUCKET_PRODUCTION }}
          S3_BUCKET=$s3_bucket make publish-r-${{ matrix.platform }}

  update-versions-json:
    if: ${{ inputs.publish != '' }}
    needs: [build, setup-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update versions.json
        run: |
          echo "Publishing versions.json for ${{ inputs.publish }}"
          s3_bucket=${{ inputs.publish == 'staging' && secrets.S3_BUCKET_STAGING || secrets.S3_BUCKET_PRODUCTION }}
          versions=$(echo '${{ needs.setup-matrix.outputs.r_versions }}' | jq -r 'join(",")')
          python manage_r_versions.py publish --s3-bucket="$s3_bucket" --versions="$versions"

  cloudsmith-publish:
    if: ${{ inputs.publish_cloudsmith != '' }}
    needs: [build, setup-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    name: Cloudsmith ${{ matrix.platform }}-${{ matrix.arch }} (R ${{ matrix.r_version }})
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudsmith-cli
        run: pip install --upgrade cloudsmith-cli

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: r-${{ matrix.r_version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/

      - name: Determine package type and Cloudsmith distro
        id: pkg-info
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          case "$PLATFORM" in
            ubuntu-2004)
              echo "distro=ubuntu/focal" >> $GITHUB_OUTPUT
              echo "pkg_type=deb" >> $GITHUB_OUTPUT
              echo "pkg_pattern=r-*.deb" >> $GITHUB_OUTPUT
              ;;
            ubuntu-2204)
              echo "distro=ubuntu/jammy" >> $GITHUB_OUTPUT
              echo "pkg_type=deb" >> $GITHUB_OUTPUT
              echo "pkg_pattern=r-*.deb" >> $GITHUB_OUTPUT
              ;;
            ubuntu-2404)
              echo "distro=ubuntu/noble" >> $GITHUB_OUTPUT
              echo "pkg_type=deb" >> $GITHUB_OUTPUT
              echo "pkg_pattern=r-*.deb" >> $GITHUB_OUTPUT
              ;;
            debian-12)
              echo "distro=debian/bookworm" >> $GITHUB_OUTPUT
              echo "pkg_type=deb" >> $GITHUB_OUTPUT
              echo "pkg_pattern=r-*.deb" >> $GITHUB_OUTPUT
              ;;
            debian-13)
              echo "distro=debian/trixie" >> $GITHUB_OUTPUT
              echo "pkg_type=deb" >> $GITHUB_OUTPUT
              echo "pkg_pattern=r-*.deb" >> $GITHUB_OUTPUT
              ;;
            centos-7)
              echo "distro=el/7" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            centos-8)
              echo "distro=el/8" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            rhel-9)
              echo "distro=el/9" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            rhel-10)
              echo "distro=el/10" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            opensuse-156)
              echo "distro=opensuse/15.6" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            opensuse-160)
              echo "distro=opensuse/16.0" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            fedora-42)
              echo "distro=fedora/42" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            fedora-43)
              echo "distro=fedora/43" >> $GITHUB_OUTPUT
              echo "pkg_type=rpm" >> $GITHUB_OUTPUT
              echo "pkg_pattern=R-*.rpm" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unknown platform: $PLATFORM"
              exit 1
              ;;
          esac

      - name: Find and publish package
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          PLATFORM: ${{ matrix.platform }}
          R_VERSION: ${{ matrix.r_version }}
          ARCH: ${{ matrix.arch }}
          PKG_PATTERN: ${{ steps.pkg-info.outputs.pkg_pattern }}
          PKG_TYPE: ${{ steps.pkg-info.outputs.pkg_type }}
          DISTRO: ${{ steps.pkg-info.outputs.distro }}
          CLOUDSMITH_REPO: ${{ inputs.publish_cloudsmith }}
          DRY_RUN: ${{ inputs.cloudsmith_dry_run }}
        run: |
          pkg_file=$(find packages/ -name "$PKG_PATTERN" -type f | head -1)

          if [[ -z "$pkg_file" || ! -f "$pkg_file" ]]; then
            echo "::warning::Package not found for $PLATFORM, R $R_VERSION, $ARCH"
            exit 0
          fi

          DRY_RUN_FLAG=""
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Running in dry-run mode"
            DRY_RUN_FLAG="--dry-run"
          fi

          echo "Publishing $pkg_file to $CLOUDSMITH_REPO/$DISTRO"

          cloudsmith push "$PKG_TYPE" \
            --verbose \
            $DRY_RUN_FLAG \
            "$CLOUDSMITH_REPO/$DISTRO" \
            "$pkg_file"

  build-macos:
    # Empty inputs.platforms means a push event (workflow input defaults don't apply to push).
    # Treat that as "all", matching get_matrix.py's behavior for the Linux jobs.
    if: ${{ inputs.platforms == '' || inputs.platforms == 'all' || contains(inputs.platforms, 'macos') }}
    needs: [setup-matrix]
    uses: ./.github/workflows/build-macos.yml
    with:
      r_versions: ${{ inputs.r_versions }}
      arch: >-
        ${{ contains(inputs.platforms, 'macos-arm64') && !contains(inputs.platforms, 'macos-x86_64') && 'arm64'
            || !contains(inputs.platforms, 'macos-arm64') && contains(inputs.platforms, 'macos-x86_64') && 'x86_64'
            || 'both' }}
      publish: ${{ inputs.publish }}
    secrets:
      AWS_PUBLISH_ROLE: ${{ secrets.AWS_PUBLISH_ROLE }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_STAGING: ${{ secrets.S3_BUCKET_STAGING }}
      S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}
      MACOS_DEVELOPER_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_CERTIFICATE }}
      MACOS_DEVELOPER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_CERTIFICATE_PASSWORD }}
      MACOS_NOTARIZATION_USER_NAME: ${{ secrets.MACOS_NOTARIZATION_USER_NAME }}
      MACOS_NOTARIZATION_USER_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_USER_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-windows:
    # See note on build-macos above re: empty inputs.platforms on push events.
    if: ${{ inputs.platforms == '' || inputs.platforms == 'all' || contains(inputs.platforms, 'windows') }}
    needs: [setup-matrix]
    uses: ./.github/workflows/build-windows.yml
    with:
      r_versions: ${{ inputs.r_versions }}
      publish: ${{ inputs.publish }}
    secrets:
      AWS_PUBLISH_ROLE: ${{ secrets.AWS_PUBLISH_ROLE }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_STAGING: ${{ secrets.S3_BUCKET_STAGING }}
      S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}
