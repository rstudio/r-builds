name: TEMP prune dry-run (delete before merge)

# Temporary: validates prune_cloudsmith.py against the live posit/open repo
# using the GHA CLOUDSMITH_API_KEY, in dry-run (no deletions). A new
# workflow_dispatch workflow can't be triggered from a PR branch, so this push
# trigger is the only way to exercise it pre-merge. Remove this file before
# merging.

on:
  push:
    branches: [jstruzik/cloudsmith-retention]

permissions:
  contents: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install cloudsmith-cli
        run: pip install --upgrade cloudsmith-cli

      - name: Prune dry-run
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          # keep=1 here only to force the selection/identifier path during this
          # dry-run validation; the real job uses keep=14.
          python prune_cloudsmith.py --repo posit/open --keep 1 --dry-run
